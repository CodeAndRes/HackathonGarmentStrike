<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ GARMENT STRIKE | Tactical Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a0e;
            --panel-bg: rgba(13, 17, 23, 0.9);
            --accent-alpha: #00ff88;
            --accent-beta: #ff4b4b;
            --text-main: #e6edf3;
            --grid-line: #1f2428;
            --coord-num-width: 30px;
            --coord-let-height: 30px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #0d1b2a 0%, #050a0e 100%);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- HEADER --- */
        header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Orbitron', sans-serif;
            background: rgba(0, 0, 0, 0.3);
        }

        .logo {
            font-weight: 900;
            letter-spacing: 3px;
            font-size: 1.2rem;
        }

        .live-status {
            display: flex;
            align-items: center;
            font-size: 0.8rem;
            color: #ff4b4b;
        }

        .led-red {
            width: 10px; /* Un pelín más grande */
            height: 10px;
            background: #ff4b4b;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 15px #ff4b4b, 0 0 5px #fff;
            animation: pulse-red 1s infinite;
            flex-shrink: 0;
        }

        @keyframes pulse-red {
            0% {
                opacity: 0.4;
                transform: scale(0.8);
            }

            50% {
                opacity: 1;
                transform: scale(1.1);
            }

            100% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px; /* Espacio mínimo entre columnas */
            padding: 8px; /* Margen de pantalla mínimo */
            flex: 1;
            min-height: 0;
            align-items: start;
        }

        .column {
            display: flex;
            flex-direction: column;
            gap: 10px; /* Reducido para ganar espacio vertical */
            height: calc(100vh - 80px); /* Ajuste preciso al alto de pantalla */
            min-height: 0;
            overflow: hidden;
        }

        .central-console-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            aspect-ratio: 1 / 1;
            /* Misma proporción que los tableros */
            min-height: 0;
        }

        /* --- BOARD STYLES --- */
        .board-container {
            display: flex;
            flex-direction: column;
            position: relative;
            /* Quitamos el flex: 1 para que no empuje hacia abajo */
        }

        .team-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .team-alpha .team-name {
            color: var(--accent-alpha);
        }

        .team-beta .team-name {
            color: var(--accent-beta);
        }

        .tactical-grid {
            display: grid;
            grid-template-columns: var(--coord-num-width) repeat(10, 1fr);
            grid-template-rows: var(--coord-let-height) repeat(10, 1fr);

            /* Fallback de color de líneas */
            background-color: rgba(255, 255, 255, 0.08);
            gap: 1px;
            padding: 1px;

            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            /* Recuperamos el marco */
            position: relative;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            margin: 0;
        }

        .team-alpha .tactical-grid {
            border-color: var(--accent-alpha);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
            background-color: rgba(0, 255, 136, 0.12);
            /* Líneas Verdes */
        }

        .team-beta .tactical-grid {
            border-color: var(--accent-beta);
            box-shadow: 0 0 15px rgba(255, 75, 75, 0.1);
            background-color: rgba(255, 75, 75, 0.12);
            /* Líneas Rojas */
        }

        .cell,
        .label {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .cell {
            aspect-ratio: 1 / 1;
            overflow: visible;
            background-color: #080c10;
            /* Fondo de la celda */
            border: none;
        }

        .label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            opacity: 0.6;
            background-color: #0d1218;
            /* Fondo de la etiqueta ligeramente distinto */
        }

        .label-alpha {
            color: var(--accent-alpha);
        }

        .label-beta {
            color: var(--accent-beta);
        }

        /* --- CENTRAL COLUMN --- */
        .team-name-massive {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 2px;
            text-transform: uppercase;
            line-height: 1.1;
            text-shadow: none;
            transition: text-shadow 0.4s ease, opacity 0.4s ease;
            opacity: 0.5;
        }

        .active-name-glow {
            text-shadow: 0 0 20px currentColor !important;
            opacity: 1 !important;
        }

        .central-scoreboard {
            background: rgba(8, 12, 16, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 10px 15px; /* Menos padding */
            position: relative;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            margin-top: 10px;
        }

        .turn-badge {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #00d4ff;
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 0.75rem;
            padding: 3px 15px;
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.6);
            white-space: nowrap;
            z-index: 10;
            letter-spacing: 1px;
        }

        .score-display {
            display: flex; /* Cambiamos a flex para control total de cercanía */
            align-items: center;
            justify-content: center;
            gap: 5px; /* Súper cerca */
            margin: -5px 0 0 0;
            width: 100%;
        }

        .score-group {
            display: flex;
            flex-direction: row; /* Volvemos a horizontal */
            align-items: flex-end; /* Alineados a la base */
            gap: 10px;
        }

        .score-box {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            transition: all 0.3s ease;
            min-width: 80px;
            text-align: center;
        }

        .score-alpha {
            color: var(--accent-alpha);
        }

        .score-beta {
            color: var(--accent-beta);
        }

        /* Glow específico para cajas de marcador y nombres activos */
        .score-box.score-alpha {
            text-shadow: 0 0 15px var(--accent-alpha);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .score-box.score-beta {
            text-shadow: 0 0 15px var(--accent-beta);
            box-shadow: 0 0 20px rgba(255, 75, 75, 0.2);
        }

        .score-stats {
            display: flex;
            flex-direction: row; /* Pedidos y prendas en la misma fila */
            align-items: flex-end;
            gap: 8px;
            font-family: 'JetBrains Mono', monospace;
            opacity: 0.6;
            margin-bottom: 8px; /* Pequeño ajuste para que no toquen el suelo exacto */
        }

        .stat-pedidos {
            font-size: 0.65rem;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .stat-prendas {
            font-size: 0.65rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .score-divider {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            opacity: 0.2;
            font-weight: 900;
            padding: 0 10px;
            margin-bottom: 5px;
        }

        .moves-log {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            min-height: 0; /* Crucial para que flex: 1 funcione con scroll */
        }

        /* Scrollbar minimalista */
        .moves-log::-webkit-scrollbar {
            width: 4px;
        }
        .moves-log::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .log-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            opacity: 0.5;
            margin-bottom: 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entries {
            flex: 1;
            overflow: hidden;
            /* Sin scroll, solo las últimas */
            display: flex;
            flex-direction: column;
            /* Dirección normal */
            gap: 4px;
        }

        .log-entry {
            font-size: 0.65rem;
            padding: 3px 6px; /* Más estrecho */
            background: rgba(255, 255, 255, 0.01);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            font-family: 'JetBrains Mono', monospace;
            opacity: 0.8;
            display: grid;
            grid-template-columns: 28px 25px 18px 1fr; /* Columnas ultra-ajustadas */
            gap: 2px; /* Gap mínimo */
            align-items: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
        }

        /* Resaltados por color de equipo */
        .log-a.log-hit { background: rgba(0, 255, 136, 0.08); opacity: 1; }
        .log-b.log-hit { background: rgba(255, 75, 75, 0.08); opacity: 1; }
        
        .log-a.log-sunk { 
            background: rgba(0, 255, 136, 0.15); 
            border-left: 2px solid var(--accent-alpha);
            opacity: 1; 
        }
        .log-b.log-sunk { 
            background: rgba(255, 75, 75, 0.15); 
            border-left: 2px solid var(--accent-beta);
            opacity: 1; 
        }

        .log-entry.latest-move {
            background: rgba(0, 40, 40, 0.4); /* Fondo más denso */
            opacity: 1;
            padding: 12px 15px;
            font-size: 1rem;
            border-radius: 4px;
            margin-bottom: 8px;
            border-left-width: 6px;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .latest-move .move-main {
            display: flex;
            gap: 10px;
            align-items: center;
            font-weight: 800;
        }

        .latest-move .move-status {
            color: #00d4ff;
            font-weight: 900;
            letter-spacing: 1px;
            font-size: 0.85rem;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .log-a {
            border-left: 2px solid var(--accent-alpha);
        }

        .log-b {
            border-left: 2px solid var(--accent-beta);
        }

        /* --- TELEMETRY (Integrated) --- */
        .tele-box {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 10px;
            margin-top: -5px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-height: 80px;
            opacity: 0.3;
            /* Por defecto apagado */
            transition: all 0.4s ease;
            filter: grayscale(0.8);
        }

        .tele-box.active-turn {
            opacity: 1;
            filter: grayscale(0);
            border-color: rgba(255, 255, 255, 0.2);
            animation: panel-glow 2s infinite alternate;
        }

        @keyframes panel-glow {
            from {
                box-shadow: 0 0 5px rgba(255, 255, 255, 0.05);
            }

            to {
                box-shadow: 0 0 30px var(--team-color-glow);
            }
        }

        .tele-alpha {
            border-top: 2px solid var(--accent-alpha);
            --team-color-glow: rgba(0, 255, 136, 0.6);
        }

        .tele-beta {
            border-top: 2px solid var(--accent-beta);
            --team-color-glow: rgba(255, 75, 75, 0.6);
        }

        .tele-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .tele-strategy {
            color: #fff;
            font-weight: 700;
            font-size: 0.85rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .tele-reasoning {
            font-size: 0.75rem;
            opacity: 0.7;
            font-style: italic;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.4;
        }

        /* --- ANIMATIONS --- */
        @keyframes cellFlash {
            0% {
                background: rgba(255, 255, 255, 0.8);
            }

            100% {
                background: transparent;
            }
        }

        .cell-flash {
            animation: cellFlash 0.5s ease-out;
        }

        .aiming-mark {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 2px solid #fff;
            box-shadow: 0 0 15px #fff, inset 0 0 10px #fff;
            animation: aimPulse 0.6s infinite alternate;
            z-index: 100;
            pointer-events: none;
        }

        /* Esquinas reforzadas para la mira */
        .aiming-mark::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            width: 10px;
            height: 10px;
            border-top: 4px solid #fff;
            border-left: 4px solid #fff;
        }

        .aiming-mark::after {
            content: '';
            position: absolute;
            bottom: -4px;
            right: -4px;
            width: 10px;
            height: 10px;
            border-bottom: 4px solid #fff;
            border-right: 4px solid #fff;
        }

        @keyframes aimPulse {
            0% {
                transform: scale(0.9);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.1);
                opacity: 1;
            }
        }

        /* --- VICTORY OVERLAY --- */
        #victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .vic-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 0 0 30px #ffd700;
            color: #ffd700;
            margin-bottom: 20px;
            animation: vicGlow 2s infinite;
        }

        @keyframes vicGlow {

            0%,
            100% {
                text-shadow: 0 0 20px #ffd700;
            }

            50% {
                text-shadow: 0 0 50px #ffd700, 0 0 80px #ffae00;
            }
        }

        /* SVG Anim */
        @keyframes neonPulse {

            0%,
            100% {
                filter: drop-shadow(0 0 2px var(--team-neon)) brightness(1);
            }

            50% {
                filter: drop-shadow(0 0 8px var(--team-neon)) brightness(1.2);
            }
        }

        .master-holo-box {
            animation: neonPulse 2s infinite ease-in-out;
        }

        /* --- TYPEWRITER CURSOR --- */
        .typing::after {
            content: '▊';
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
            color: inherit;
            font-size: 1.1em;
        }

        @keyframes blink {

            from,
            to {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">⚡ GARMENT STRIKE</div>
    </header>

    <main>
        <!-- TEAM ALPHA COLUMN -->
        <div class="column team-alpha">
            <div class="team-header" style="display: flex; flex-direction: column; align-items: flex-end; margin-top: 15px; margin-bottom: 10px;">
                <div class="team-name-massive score-alpha" id="alpha-name-huge">ALPHA</div>
            </div>
            <div class="tactical-grid" id="grid-alpha">
                <!-- Generated by JS -->
            </div>
            <!-- Telemetría integrada -->
            <div class="tele-box tele-alpha">
                <div class="tele-title" id="alpha-tele-title">TELEMETRÍA ALPHA</div>
                <div class="tele-strategy" id="alpha-strategy">...</div>
                <div class="tele-reasoning" id="alpha-reasoning">...</div>
            </div>
        </div>

        <!-- CENTRAL COLUMN -->
        <div class="column">
            <div class="central-scoreboard">
                <div class="turn-badge" id="turn-badge">TURNO #0</div>
                <div class="live-status" style="position: absolute; top: 15px; left: 15px; font-family: 'Orbitron', sans-serif; font-weight: 900;">
                    <div class="led-red"></div>
                    <span id="match-status-text">LIVE</span>
                </div>
                <div class="score-display">
                    <div class="score-group">
                        <div class="score-stats">
                            <span class="stat-pedidos" id="alpha-total-pedidos">/4 PEDIDOS</span>
                            <span class="stat-prendas score-alpha" id="alpha-prendas">0 PRENDAS</span>
                        </div>
                        <div class="score-box score-alpha" id="alpha-score">0</div>
                    </div>
                    
                    <div class="score-divider">VS</div>

                    <div class="score-group">
                        <div class="score-box score-beta" id="beta-score">0</div>
                        <div class="score-stats">
                            <span class="stat-pedidos" id="beta-total-pedidos">/4 PEDIDOS</span>
                            <span class="stat-prendas score-beta" id="beta-prendas">0 PRENDAS</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="moves-log">
                <div class="log-entries" id="log-entries"></div>
            </div>
        </div>

        <!-- TEAM BETA COLUMN -->
        <div class="column team-beta">
            <div class="team-header"
                style="display: flex; flex-direction: column; align-items: flex-start; margin-top: 15px; margin-bottom: 10px;">
                <div class="team-name-massive score-beta" id="beta-name-huge">BETA</div>
            </div>
            <div class="tactical-grid" id="grid-beta">
                <!-- Generated by JS -->
            </div>
            <!-- Telemetría integrada -->
            <div class="tele-box tele-beta">
                <div class="tele-title" id="beta-tele-title">TELEMETRÍA BETA</div>
                <div class="tele-strategy" id="beta-strategy">...</div>
                <div class="tele-reasoning" id="beta-reasoning">...</div>
            </div>
        </div>
    </main>

    <div id="victory-overlay">
        <div class="vic-title" id="victory-text">VICTORIA</div>
        <div id="victory-subtext" style="font-family: 'Orbitron'; font-size: 1.5rem; opacity: 0.8;">TEAM ALPHA</div>
        <button onclick="location.reload()"
            style="margin-top: 40px; background: transparent; border: 1px solid #ffd700; color: #ffd700; padding: 10px 30px; font-family: 'Orbitron'; cursor: pointer; border-radius: 4px;">REINICIAR
            INTERFAZ</button>
    </div>

    <script>
        const API_URL = `ws://${window.location.hostname || '127.0.0.1'}:8000/ws/tactical`;
        const STATE_URL = `http://${window.location.hostname || '127.0.0.1'}:8000/api/state`;
        let lastState = null;
        let ws = null;
        let pollingInterval = null;

        function connect() {
            console.log("Intentando conectar a WebSocket...");
            ws = new WebSocket(API_URL);

            ws.onmessage = (event) => {
                const state = JSON.parse(event.data);
                updateDashboard(state);
                // Si el WS funciona, nos aseguramos de que el polling esté apagado
                stopPolling();
            };

            ws.onclose = () => {
                console.warn("WebSocket cerrado. Iniciando polling de emergencia...");
                document.getElementById('turn-indicator').innerText = "WS DESCONECTADO - USANDO POLLING";
                startPolling();
                setTimeout(connect, 5000); // Intentar reconectar WS cada 5s
            };

            ws.onerror = (err) => {
                console.error("Error en WebSocket:", err);
                startPolling();
            };

            ws.onopen = () => {
                console.log("WebSocket conectado correctamente.");
                document.getElementById('turn-indicator').innerText = "SISTEMA EN LÍNEA (WS)";
                stopPolling();
            };
        }

        function startPolling() {
            if (pollingInterval) return;
            console.log("Iniciando polling cada 2s...");
            pollingInterval = setInterval(async () => {
                try {
                    const resp = await fetch(STATE_URL);
                    if (resp.ok) {
                        const state = await resp.json();
                        if (state && !state.error) {
                            updateDashboard(state);
                        }
                    }
                } catch (err) {
                    console.error("Error en polling:", err);
                }
            }, 1000);
        }

        function stopPolling() {
            if (pollingInterval) {
                console.log("Deteniendo polling...");
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }

        window.onerror = function (msg, url, lineNo, columnNo, error) {
            console.error("GLOBAL ERROR:", msg, "at", url, ":", lineNo);
            return false;
        };

        function updateDashboard(state) {
            try {
                if (!state || !state.team_a || !state.team_b) {
                    console.warn("Invalid state received:", state);
                    return;
                }

                // 1. Header & Scoreboard
                document.getElementById('turn-badge').innerText = `TURNO #${state.turn || 0}`;
                
                // Marcador central (éxitos de cada equipo)
                document.getElementById('alpha-score').innerText = state.team_b.pedidos_encajados;
                document.getElementById('beta-score').innerText = state.team_a.pedidos_encajados;
                
                document.getElementById('alpha-prendas').innerText = `${state.team_b.prendas_encajadas} PRENDAS`;
                document.getElementById('beta-prendas').innerText = `${state.team_a.prendas_encajadas} PRENDAS`;
                
                document.getElementById('alpha-name-huge').innerText = state.team_a.name || 'ALPHA';
                document.getElementById('beta-name-huge').innerText = state.team_b.name || 'BETA';
                
                document.getElementById('alpha-total-pedidos').innerText = `/${state.team_b.total_pedidos ?? 0} PEDIDOS`;
                document.getElementById('beta-total-pedidos').innerText = `/${state.team_a.total_pedidos ?? 0} PEDIDOS`;

                const isAlphaTurn = state.turn_agent === 'team_a';
                
                // 5. Victory & Status LED
                const overlay = document.getElementById('victory-overlay');
                const liveLed = document.querySelector('.led-red');
                const statusSpan = document.getElementById('match-status-text');

                if (state.finished) {
                    overlay.style.display = 'flex';
                    document.getElementById('victory-subtext').innerText = (state.winner || "EMPATE").toUpperCase();

                    if (liveLed) {
                        liveLed.style.animation = 'none';
                        liveLed.style.background = '#444';
                        liveLed.style.boxShadow = 'none';
                    }
                    if (statusSpan) {
                        statusSpan.innerText = 'MATCH OVER';
                        statusSpan.parentElement.style.color = '#666';
                    }
                } else {
                    overlay.style.display = 'none';
                    if (liveLed) {
                        liveLed.style.animation = 'pulse-red 1s infinite';
                        liveLed.style.background = '#ff4b4b';
                        liveLed.style.boxShadow = '0 0 15px #ff4b4b';
                    }
                    if (statusSpan) {
                        statusSpan.innerText = 'LIVE';
                        statusSpan.parentElement.style.color = '#ff4b4b';
                    }
                }

                // Glow de los nombres laterales
                const alphaNameHuge = document.getElementById('alpha-name-huge');
                const betaNameHuge = document.getElementById('beta-name-huge');
                if (alphaNameHuge) alphaNameHuge.classList.toggle('active-name-glow', isAlphaTurn);
                if (betaNameHuge) betaNameHuge.classList.toggle('active-name-glow', !isAlphaTurn);

                document.querySelector('.tele-alpha').classList.toggle('active-turn', isAlphaTurn);
                document.querySelector('.tele-beta').classList.toggle('active-turn', !isAlphaTurn);

                // 2. Telemetry
                if (state.telemetry) {
                    updateTelemetry('alpha', state.telemetry.team_a || {}, state.team_a.name || 'Alpha');
                    updateTelemetry('beta', state.telemetry.team_b || {}, state.team_b.name || 'Beta');
                }

                // 3. Boards
                renderBoard('alpha', state.team_a, (state.telemetry || {}).team_b);
                renderBoard('beta', state.team_b, (state.telemetry || {}).team_a);

                // 4. Log
                if (state.comms) updateLog(state.comms);

                lastState = state;
            } catch (err) {
                console.error("Error in updateDashboard:", err);
            }
        }

        const typingIntervals = new Map();

        function typeWriter(elementId, text) {
            const el = document.getElementById(elementId);
            if (!el || el.dataset.fullText === text) return;

            // Cancel previous typing for this element
            if (typingIntervals.has(elementId)) {
                clearInterval(typingIntervals.get(elementId));
            }

            el.dataset.fullText = text;
            el.innerText = '';
            el.classList.add('typing');

            let i = 0;
            const interval = setInterval(() => {
                if (i < text.length) {
                    el.innerText += text.charAt(i);
                    i++;
                } else {
                    clearInterval(interval);
                    el.classList.remove('typing');
                    typingIntervals.delete(elementId);
                }
            }, 10); // Speed of typing (ms per char) - Faster for better sync

            typingIntervals.set(elementId, interval);
        }

        function updateTelemetry(key, data, name) {
            document.getElementById(`${key}-tele-title`).innerText = `TELEMETRÍA ${name}`;

            const strategy = data.strategy || 'INICIANDO PROTOCOLO...';
            const reasoning = data.reasoning || 'CALIBRANDO SISTEMAS DE LOGÍSTICA...';

            typeWriter(`${key}-strategy`, strategy);
            typeWriter(`${key}-reasoning`, reasoning);
        }

        function renderBoard(teamKey, teamData, tele) {
            const grid = document.getElementById(`grid-${teamKey}`);
            const teamColor = teamKey === 'alpha' ? '#00ff88' : '#ff4b4b';

            const numRows = teamData.board.length;
            const numCols = teamData.board[0].length;

            // Re-render full grid if size changed or not existing
            if (grid.children.length === 0 || grid.dataset.size != numRows) {
                grid.innerHTML = '';
                grid.dataset.size = numRows;
                grid.style.gridTemplateColumns = `var(--coord-num-width) repeat(${numCols}, 1fr)`;
                grid.style.gridTemplateRows = `var(--coord-let-height) repeat(${numRows}, 1fr)`;

                // Column labels: A B C D... (letters = cols in engine)
                grid.appendChild(createCell('', 'label'));
                const COLS = 'ABCDEFGHIJ';
                for (let c = 0; c < numCols; c++) grid.appendChild(createCell(COLS[c], `label label-${teamKey}`));

                // Row labels: 1 2 3... (numbers = rows in engine)
                for (let r = 0; r < numRows; r++) {
                    grid.appendChild(createCell(r + 1, `label label-${teamKey}`));
                    for (let c = 0; c < numCols; c++) {
                        grid.appendChild(createCell('', 'cell', `cell-${teamKey}-${r}-${c}`));
                    }
                }
            }

            // Update cells
            for (let r = 0; r < numRows; r++) {
                for (let c = 0; c < numCols; c++) {
                    const cellId = `cell-${teamKey}-${r}-${c}`;
                    const cellEl = document.getElementById(cellId);
                    const symbol = teamData.board[r][c];
                    const shipId = teamData.fleet ? teamData.fleet[`${r},${c}`] : null;

                    const stateKey = teamKey === 'alpha' ? 'team_a' : 'team_b';
                    const oldSymbol = lastState ? lastState[stateKey].board[r][c] : null;

                    // Check connections for smart borders
                    const hasShip = shipId && shipId !== 'NONE';
                    const conn = {
                        top: hasShip && r > 0 && teamData.fleet[`${r - 1},${c}`] == shipId,
                        bottom: hasShip && r < numRows - 1 && teamData.fleet[`${r + 1},${c}`] == shipId,
                        left: hasShip && c > 0 && teamData.fleet[`${r},${c - 1}`] == shipId,
                        right: hasShip && c < numCols - 1 && teamData.fleet[`${r},${c + 1}`] == shipId
                    };

                    const isSunk = shipId && teamData.sunk_ships && teamData.sunk_ships.includes(shipId);
                    const opponentColor = teamKey === 'alpha' ? '#ff4b4b' : '#00ff88';
                    const localColor = teamKey === 'alpha' ? '#00ff88' : '#ff4b4b';

                    let content = '';
                    if (symbol === '#') {
                        content = getHoloBoxSVG(localColor, conn, false, false);
                    } else if (symbol === 'X') {
                        // Si está hundido (SUNK), todo es del atacante. Si es HIT, caja local y prenda del atacante.
                        const boxColor = isSunk ? opponentColor : localColor;
                        content = getHoloBoxSVG(boxColor, conn, isSunk, true, opponentColor);
                    } else if (symbol === 'O') {
                        content = getHoloMissSVG();
                    } else if (symbol && symbol !== '~') {
                        // Fallback for emojis or other symbols
                        content = `<div style="font-size: 1.2rem;">${symbol}</div>`;
                    }

                    // Check if aiming — engine coord format: "A3" = col A (index 0), row 3 (index 2)
                    if (tele && tele.cursor === 'aiming' && tele.target) {
                        const tColIdx = 'ABCDEFGHIJ'.indexOf(tele.target[0]);  // col index
                        const tRowIdx = parseInt(tele.target.substring(1)) - 1; // row index (0-based)
                        if (tRowIdx === r && tColIdx === c) {
                            content += '<div class="aiming-mark"></div>';
                        }
                    }

                    if (cellEl.innerHTML !== content) {
                        cellEl.innerHTML = content;

                        // Si hay barco, quitamos el borde de la rejilla para que la unión sea perfecta
                        if (hasShip) {
                            cellEl.style.border = 'none';
                        } else {
                            cellEl.style.border = '0.5px solid rgba(255,255,255,0.03)';
                        }

                        if (oldSymbol !== symbol && oldSymbol !== null) {
                            cellEl.classList.add('cell-flash');
                            setTimeout(() => cellEl.classList.remove('cell-flash'), 500);
                        }
                    }
                }
            }
        }

        function createCell(text, className, id) {
            const div = document.createElement('div');
            div.className = className;
            if (id) div.id = id;
            div.innerText = text;
            return div;
        }

        let lastLogHash = '';
        function updateLog(comms) {
            if (!comms || comms.length === 0) {
                document.getElementById('log-entries').innerHTML = '';
                lastLogHash = '';
                return;
            }

            // Creamos un hash simple de los últimos mensajes para saber si hay cambios
            const currentHash = comms.length + (comms.length > 0 ? comms[comms.length - 1].coord : '');
            if (currentHash === lastLogHash) return;
            lastLogHash = currentHash;

            const container = document.getElementById('log-entries');

            // Mostramos exactamente 20 registros
            const latest = comms.slice(-20).reverse();

            container.innerHTML = latest.map((c, index) => {
                const teamClass = c.agent === 'A' ? 'log-a' : 'log-b';
                const teamColor = c.agent === 'A' ? 'var(--accent-alpha)' : 'var(--accent-beta)';
                
                // Mapeo de iconos y clases de resaltado
                let tacticalIcon = '·';
                let highlightClass = '';
                let iconScale = '1';

                const res = c.result.toUpperCase();
                if (res.includes('SUNK') || res.includes('SELLADO')) {
                    tacticalIcon = '📦';
                    highlightClass = 'log-sunk';
                    iconScale = '1.3';
                }
                else if (res.includes('HIT') || res.includes('IMPACTO')) {
                    tacticalIcon = '👕';
                    highlightClass = 'log-hit';
                    iconScale = '1.15';
                }
                else if (res.includes('MISS') || res.includes('PERDIDA')) tacticalIcon = '❔';
                else if (res.includes('ALREADY')) tacticalIcon = '🚫';
                
                if (index === 0) {
                    // Banner destacado para la última jugada
                    const isMiss = c.result.toUpperCase().includes('MISS') || c.result.toUpperCase().includes('ALREADY');
                    const statusText = isMiss ? 'PRENDA PERDIDA' : c.result.toUpperCase();
                    const statusColor = isMiss ? '#00d4ff' : '#fff';
                    const statusSize = isMiss ? '1.1rem' : '0.85rem';
                    
                    return `
                        <div class="log-entry latest-move ${teamClass}">
                            <div class="move-main">
                                <span style="color: ${teamColor}; opacity: 0.6; font-size: 0.8rem;">T${c.turn}</span>
                                <span style="color: #fff; font-weight: 800;">${c.coord}</span>
                                <span style="margin-left: 5px;">${tacticalIcon}</span>
                            </div>
                            <div class="move-status" style="color: ${statusColor}; font-size: ${statusSize}">${statusText}</div>
                        </div>
                    `;
                }

                return `
                    <div class="log-entry ${teamClass} ${highlightClass}">
                        <span style="color: ${teamColor}; opacity: 0.6; font-weight: 900;">T${c.turn}</span>
                        <span style="color: #fff; font-weight: 700;">${c.coord}</span>
                        <span style="transform: scale(${iconScale}); display: inline-block;">${tacticalIcon}</span>
                        <span style="color: #fff; font-family: 'Roboto Condensed', sans-serif; font-size: 0.85rem; letter-spacing: -0.3px; border-left: 1px solid rgba(255,255,255,0.05); padding-left: 4px;">
                            ${c.reasoning || c.result}
                        </span>
                    </div>
                `;
            }).join('');
        }

        // --- SVG GENERATORS (Ported from holographics.py) ---

        function getHoloBoxSVG(color, conn, isSealed, isHit, garmentColor) {
            const margin = 10;
            const inset = 12; // Aumentado para más profundidad
            const isVertical = conn.top || conn.bottom;
            const shirtColor = garmentColor || color;

            // Solape mínimo (0.5px) para evitar grietas sin salirse de la celda
            let ix1 = conn.left ? -0.5 : margin;
            let ix2 = conn.right ? 100.5 : 100 - margin;
            let iy1 = conn.top ? -0.5 : margin;
            let iy2 = conn.bottom ? 100.5 : 100 - margin;

            let bx1 = conn.left ? -0.5 : margin + inset;
            let bx2 = conn.right ? 100.5 : 100 - (margin + inset);
            let by1 = conn.top ? -0.5 : margin + inset;
            let by2 = conn.bottom ? 100.5 : 100 - (margin + inset);

            let elements = [];

            if (isSealed) {
                // Background & Border: Dibujamos un perímetro inteligente
                // Solo trazamos línea (stroke) si NO hay conexión en ese lado
                let path = `M ${ix1} ${iy1}`;
                path += ` L ${ix2} ${iy1}`;
                path += ` L ${ix2} ${iy2}`;
                path += ` L ${ix1} ${iy2}`;
                path += ` Z`;

                // Relleno
                elements.push(`<path d="${path}" fill="${color}" fill-opacity="0.2" class="master-holo-box"/>`);

                // Bordes selectivos (Smart Borders)
                if (!conn.top) elements.push(`<line x1="${ix1}" y1="${iy1}" x2="${ix2}" y2="${iy1}" stroke="${color}" stroke-width="2" stroke-opacity="0.8"/>`);
                if (!conn.right) elements.push(`<line x1="${ix2}" y1="${iy1}" x2="${ix2}" y2="${iy2}" stroke="${color}" stroke-width="2" stroke-opacity="0.8"/>`);
                if (!conn.bottom) elements.push(`<line x1="${ix2}" y1="${iy2}" x2="${ix1}" y2="${iy2}" stroke="${color}" stroke-width="2" stroke-opacity="0.8"/>`);
                if (!conn.left) elements.push(`<line x1="${ix1}" y1="${iy2}" x2="${ix1}" y2="${iy1}" stroke="${color}" stroke-width="2" stroke-opacity="0.8"/>`);

                // Tape: Cinta de embalaje continua
                const isVertical = conn.top || conn.bottom;
                if (isVertical) {
                    const tx = (ix1 + ix2) / 2;
                    const ty1 = conn.top ? -0.5 : iy1;
                    const ty2 = conn.bottom ? 100.5 : iy2;
                    elements.push(`<line x1="${tx}" y1="${ty1}" x2="${tx}" y2="${ty2}" stroke="${color}" stroke-width="15" stroke-opacity="0.2"/>`);
                    elements.push(`<line x1="${tx}" y1="${ty1}" x2="${tx}" y2="${ty2}" stroke="#000" stroke-width="1" stroke-opacity="0.3"/>`);
                } else {
                    const ty = (iy1 + iy2) / 2;
                    const tx1 = conn.left ? -0.5 : ix1;
                    const tx2 = conn.right ? 100.5 : ix2;
                    elements.push(`<line x1="${tx1}" y1="${ty}" x2="${tx2}" y2="${ty}" stroke="${color}" stroke-width="15" stroke-opacity="0.2"/>`);
                    elements.push(`<line x1="${tx1}" y1="${ty}" x2="${tx2}" y2="${ty}" stroke="#000" stroke-width="1" stroke-opacity="0.3"/>`);
                }

                // Seam Line (Unión de cartón) - Solo en el fondo
                if (isVertical) {
                    elements.push(`<line x1="50" y1="${by1}" x2="50" y2="${by2}" stroke="${color}" stroke-width="1.2" stroke-opacity="0.3"/>`);
                } else {
                    elements.push(`<line x1="${bx1}" y1="50" x2="${bx2}" y2="50" stroke="${color}" stroke-width="1.2" stroke-opacity="0.3"/>`);
                }

                // Label
                if (!conn.right && !conn.bottom) {
                    elements.push(`
                        <g transform="translate(${ix2 - 28}, ${iy2 - 22}) rotate(5)">
                            <rect width="20" height="14" fill="#fff" rx="1" fill-opacity="0.8"/>
                            <line x1="3" y1="4" x2="17" y2="4" stroke="#000" stroke-width="1.5" stroke-opacity="0.5"/>
                            <line x1="3" y1="7" x2="12" y2="7" stroke="#000" stroke-width="1" stroke-opacity="0.3"/>
                        </g>
                    `);
                }
            } else {
                // Walls
                if (!conn.top) elements.push(`<path d="M ${ix1} ${iy1} L ${ix2} ${iy1} L ${bx2} ${by1} L ${bx1} ${by1} Z" fill="${color}" fill-opacity="0.1"/>`);
                if (!conn.bottom) elements.push(`<path d="M ${ix1} ${iy2} L ${ix2} ${iy2} L ${bx2} ${by2} L ${bx1} ${by2} Z" fill="${color}" fill-opacity="0.1"/>`);
                if (!conn.left) elements.push(`<path d="M ${ix1} ${iy1} L ${ix1} ${iy2} L ${bx1} ${by2} L ${bx1} ${by1} Z" fill="${color}" fill-opacity="0.1"/>`);
                if (!conn.right) elements.push(`<path d="M ${ix2} ${iy1} L ${ix2} ${iy2} L ${bx2} ${by2} L ${bx2} ${by1} Z" fill="${color}" fill-opacity="0.1"/>`);

                // Seam Line (Unión de cartón) - Solo en el rectángulo del fondo
                if (isVertical) {
                    elements.push(`<line x1="50" y1="${by1}" x2="50" y2="${by2}" stroke="${color}" stroke-width="1.2" stroke-opacity="0.4"/>`);
                } else {
                    elements.push(`<line x1="${bx1}" y1="50" x2="${bx2}" y2="50" stroke="${color}" stroke-width="1.2" stroke-opacity="0.4"/>`);
                }

                // Floor
                let fPath = "";
                if (!conn.top) fPath += ` M ${bx1} ${by1} L ${bx2} ${by1}`;
                if (!conn.bottom) fPath += ` M ${bx1} ${by2} L ${bx2} ${by2}`;
                if (!conn.left) fPath += ` M ${bx1} ${by1} L ${bx1} ${by2}`;
                if (!conn.right) fPath += ` M ${bx2} ${by1} L ${bx2} ${by2}`;
                elements.push(`<path d="${fPath}" fill="none" stroke="${color}" stroke-width="1" stroke-opacity="0.5"/>`);

                // Outer Perim
                let pPath = "";
                if (!conn.top) pPath += ` M ${ix1} ${iy1} L ${ix2} ${iy1}`;
                if (!conn.bottom) pPath += ` M ${ix1} ${iy2} L ${ix2} ${iy2}`;
                if (!conn.left) pPath += ` M ${ix1} ${iy1} L ${ix1} ${iy2}`;
                if (!conn.right) pPath += ` M ${ix2} ${iy1} L ${ix2} ${iy2}`;
                elements.push(`<path d="${pPath}" fill="none" stroke="${color}" stroke-width="2" stroke-opacity="0.8"/>`);

                // Diagonals
                if (!conn.left && !conn.top) elements.push(`<line x1="${ix1}" y1="${iy1}" x2="${bx1}" y2="${by1}" stroke="${color}" stroke-width="1" stroke-opacity="0.4"/>`);
                if (!conn.right && !conn.top) elements.push(`<line x1="${ix2}" y1="${iy1}" x2="${bx2}" y2="${by1}" stroke="${color}" stroke-width="1" stroke-opacity="0.4"/>`);
                if (!conn.left && !conn.bottom) elements.push(`<line x1="${ix1}" y1="${iy2}" x2="${bx1}" y2="${by2}" stroke="${color}" stroke-width="1" stroke-opacity="0.4"/>`);
                if (!conn.right && !conn.bottom) elements.push(`<line x1="${ix2}" y1="${iy2}" x2="${bx2}" y2="${by2}" stroke="${color}" stroke-width="1" stroke-opacity="0.4"/>`);

                // Shirt icon if hit
                if (isHit) {
                    elements.push(`
                        <g transform="translate(50,50) scale(1.8) translate(-10,-11)">
                            <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.47a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.47a2 2 0 00-1.34-2.23z" 
                                  fill="none" stroke="${shirtColor}" stroke-width="1.5" stroke-opacity="0.9" class="master-holo-box"/>
                        </g>
                    `);
                }

                // Flaps: Reducidos para que no se salgan de la celda
                const fH = 6;
                const fW = 6;

                // TOP FLAP
                if (!conn.top) {
                    let fx1 = conn.left ? ix1 : ix1 + 4;
                    let fx2 = conn.right ? ix2 : ix2 - 4;
                    // Si hay conexión lateral, no estrechamos ese lado para que sea continuo
                    elements.push(`<path d="M ${ix1} ${iy1} L ${fx1} ${iy1 - fH} L ${fx2} ${iy1 - fH} L ${ix2} ${iy1} Z" fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="1" stroke-opacity="0.5"/>`);
                }

                // BOTTOM FLAP
                if (!conn.bottom) {
                    let fx1 = conn.left ? ix1 : ix1 + 4;
                    let fx2 = conn.right ? ix2 : ix2 - 4;
                    elements.push(`<path d="M ${ix1} ${iy2} L ${fx1} ${iy2 + fH} L ${fx2} ${iy2 + fH} L ${ix2} ${iy2} Z" fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="1" stroke-opacity="0.5"/>`);
                }

                // LEFT FLAP
                if (!conn.left) {
                    let fy1 = conn.top ? iy1 : iy1 + 4;
                    let fy2 = conn.bottom ? iy2 : iy2 - 4;
                    elements.push(`<path d="M ${ix1} ${iy1} L ${ix1 - fW} ${fy1} L ${ix1 - fW} ${fy2} L ${ix1} ${iy2} Z" fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="1" stroke-opacity="0.5"/>`);
                }

                // RIGHT FLAP
                if (!conn.right) {
                    let fy1 = conn.top ? iy1 : iy1 + 4;
                    let fy2 = conn.bottom ? iy2 : iy2 - 4;
                    elements.push(`<path d="M ${ix2} ${iy1} L ${ix2 + fW} ${fy1} L ${ix2 + fW} ${fy2} L ${ix2} ${iy2} Z" fill="${color}" fill-opacity="0.2" stroke="${color}" stroke-width="1" stroke-opacity="0.5"/>`);
                }
            }

            return `<svg viewBox="0 0 100 100" style="overflow:visible; width:100%; height:100%;">${elements.join('')}</svg>`;
        }

        function getHoloMissSVG() {
            return `
                <svg viewBox="0 0 100 100" style="width:70%; height:70%; opacity:0.5; transform: rotate(-10deg);">
                    <path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.47a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.47a2 2 0 00-1.34-2.23z" 
                          fill="none" stroke="#00d4ff" stroke-width="2" transform="translate(25,25) scale(1.8)"/>
                    <line x1="25" y1="25" x2="75" y2="75" stroke="#00d4ff" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
                </svg>
            `;
        }

        // Start connection
        connect();
    </script>
</body>
