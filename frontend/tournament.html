<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garment Strike | Tournament Bracket</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000; /* True black for projector contrast */
            --panel-bg: rgba(15, 22, 30, 0.95); /* More solid */
            --accent-blue: #00e5ff; /* Brighter */
            --accent-orange: #ffaa00; /* Brighter */
            --accent-green: #00ff9d; /* Brighter */
            --accent-red: #ff5555;
            --text-main: #ffffff; /* Pure white */
            --border-dim: rgba(255, 255, 255, 0.25); /* More visible lines */
            --neon-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', monospace;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 50% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 70%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-dim);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 5px;
            font-size: 1.5rem;
            text-transform: uppercase;
        }

        .controls {
            display: flex;
            gap: 15px;
        }

        .btn-validate {
            border-color: #ff9f43 !important;
            color: #ff9f43 !important;
        }
        .btn-validate:hover {
            background: #ff9f43 !important;
            color: #000 !important;
        }

        #validation-results {
            position: fixed;
            top: 100px;
            right: 20px;
            width: 350px;
            max-height: 80vh;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid #333;
            padding: 20px;
            overflow-y: auto;
            z-index: 2500; /* Por encima del menú lateral */
            display: none;
            box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(255, 159, 67, 0.2);
            border: 1px solid #ff9f43;
        }

        .val-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .val-name { font-weight: bold; font-family: Orbitron; font-size: 0.9rem; }
        .val-status { font-size: 0.7rem; text-transform: uppercase; margin-top: 4px; }
        .val-error { color: #ff4b4b; font-size: 0.8rem; margin-top: 5px; list-style: none; padding: 0; }
        .val-success { color: #00ff88; }

        button {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 8px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            background: var(--accent-blue);
            color: var(--bg-color);
            box-shadow: var(--neon-shadow);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* --- TACTICAL SIDE MENU --- */
        .menu-toggle {
            position: fixed;
            top: 10px;
            right: 15px;
            z-index: 2000;
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--accent-blue);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: var(--neon-shadow);
        }

        .menu-toggle:hover {
            background: var(--accent-blue);
        }

        .menu-toggle span {
            width: 25px;
            height: 2px;
            background: var(--accent-blue);
            transition: 0.3s;
        }

        .menu-toggle:hover span {
            background: #000;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: rgba(10, 15, 20, 0.95);
            backdrop-filter: blur(15px);
            border-left: 1px solid var(--accent-blue);
            z-index: 1500;
            padding: 40px 30px;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            gap: 40px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .side-menu.active {
            right: 0;
        }

        .menu-section {
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .menu-section h4 {
            font-family: Orbitron;
            font-size: 0.8rem;
            color: var(--accent-blue);
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .side-menu .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .side-menu button {
            width: 100%;
            text-align: left;
            padding: 12px 20px;
        }

        .timer-compact {
            text-align: center;
        }

        .timer-compact #timer-display {
            font-size: 3.5rem;
            margin: 10px 0;
        }


        .tournament-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 60px 20px;
            min-height: calc(100vh - 80px);
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            height: 100%;
            gap: 40px;
        }

        .match-card {
            width: 280px;
            /* Ajustado para 1080p */
            background: var(--panel-bg);
            border: 1px solid var(--border-dim);
            padding: 15px;
            position: relative;
            transition: all 0.3s;
            z-index: 10;
        }

        .match-card:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.1);
        }

        /* SVG connector overlay */
        #bracket-svg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        .round {
            display: flex;
            flex-direction: column;
            gap: 60px;
            justify-content: center;
        }

        .round-q {
            gap: 180px;
        }

        .match-card.running {
            border-color: var(--accent-orange);
            box-shadow: 0 0 15px rgba(255, 157, 0, 0.2);
        }

        .match-card.finished {
            border-color: var(--accent-green);
        }

        .team {
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.08); /* Better contrast */
            font-size: 1.3rem; /* Letra AÚN más grande para proyector */
            font-weight: bold; /* Más legible */
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
        }

        .team.winner {
            color: var(--accent-green);
            border-left-color: var(--accent-green);
            background: rgba(0, 255, 136, 0.08);
        }

        .team.loser {
            opacity: 0.4;
            text-decoration: line-through;
        }

        .match-id {
            position: absolute;
            top: -12px;
            left: 10px;
            background: var(--bg-color);
            padding: 0 8px;
            font-size: 1rem;
            color: #bbb; /* Más contraste */
            font-weight: 900;
        }

        .btn-run {
            width: 100%;
            margin-top: 12px;
            font-size: 1rem;
            font-weight: bold;
            padding: 10px;
        }

        /* Bracket Connectors (CSS lines) */
        .round-q {
            margin-right: 40px;
        }

        .round-s {
            margin-right: 40px;
        }

        .winner-panel {
            text-align: center;
            padding: 20px;
            border: 2px solid var(--accent-orange);
            background: rgba(255, 157, 0, 0.05);
            box-shadow: 0 0 30px rgba(255, 157, 0, 0.1);
        }

        .winner-panel h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--accent-orange);
            margin-bottom: 10px;
        }

        .status-badge {
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 3px;
            text-transform: uppercase;
        }

        .status-running {
            background: var(--accent-orange);
            color: black;
        }

        .status-finished {
            background: var(--accent-green);
            color: black;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Garment Strike <span style="color: var(--accent-blue)">Tournament</span></h1>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div id="side-menu" class="side-menu">
        <div class="menu-section">
            <h4>Gestión de Torneo</h4>
            <div class="controls">
                <button class="btn-validate" onclick="validateAgents()">Validar Equipos</button>
                <button onclick="runNextMatch()" style="border-color: var(--accent-green); color: var(--accent-green); font-weight: bold;">Lanzar Siguiente Combate 🚀</button>
                <button onclick="toggleTimer()" style="border-color: #00ff9d; color: #00ff9d;">Mostrar Temporizador</button>
                <button onclick="setupTournament()">Inicializar Torneo</button>
                <button onclick="resetTournament()"
                    style="border-color: var(--accent-red); color: var(--accent-red);">Reset Torneo</button>
            </div>
        </div>
    </div>

    <div id="timer-panel" style="display: none; position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 1200; width: 450px;">
        <div style="position: relative; text-align: center; border: 2px solid var(--accent-blue); padding: 25px 40px; background: rgba(0, 0, 0, 0.9); border-radius: 8px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); backdrop-filter: blur(10px);">
            <!-- Botón cerrar (X) -->
            <button onclick="toggleTimer()" style="position: absolute; top: 10px; right: 10px; padding: 2px 8px; border: none; background: none; color: var(--accent-red); font-size: 1.2rem; cursor: pointer;">✕</button>
            
            <div style="font-family: 'Orbitron'; font-size: 1.1rem; color: var(--accent-blue); font-weight: bold; letter-spacing: 3px; margin-bottom: 10px;">TIEMPO DE PREPARACIÓN</div>
            <div id="timer-display" style="font-family: 'JetBrains Mono', monospace; font-size: 4.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(0,212,255,0.8); margin-bottom: 15px; transition: color 0.3s, text-shadow 0.3s;">05:00</div>
            <div class="timer-controls" style="display: flex; gap: 15px; justify-content: center; align-items: center;">
                <input type="number" id="timer-minutes" value="5" min="1" max="60" style="width: 70px; background: rgba(0,0,0,0.8); border: 2px solid var(--accent-blue); color: white; padding: 5px; text-align: center; font-family: 'JetBrains Mono'; font-size: 1.2rem; font-weight: bold; outline: none;">
                <span style="font-size: 1.1rem; color: #ccc; margin-right: 10px; font-weight: bold;">MIN</span>
                <button onclick="startTimer()" id="btn-timer-start" style="padding: 8px 20px; font-size: 1.1rem; font-weight: bold; border-color: var(--accent-green); color: var(--accent-green);">INICIAR</button>
                <button onclick="resetTimer()" style="padding: 8px 20px; font-size: 1.1rem; font-weight: bold; border-color: var(--accent-red); color: var(--accent-red);">STOP</button>
            </div>
        </div>
    </div>





    <div id="validation-results">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3 style="margin:0; font-family:Orbitron; color:#ff9f43;">Informe de Validación</h3>
            <button onclick="document.getElementById('validation-results').style.display='none'" style="padding:2px 8px;">X</button>
        </div>
        <div id="validation-content"></div>
    </div>



    <style>
        .tournament-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            padding: 20px;
            flex: 1; /* Ocupa el espacio restante y centra el diagrama perfectamente */
            width: 100%;
            overflow-x: auto;
        }

        .side-col {
            display: flex;
            align-items: center;
            gap: 40px;
            /* Coincide con 20+20 */
            flex: 1;
            min-width: 380px;
        }

        .left-col {
            justify-content: flex-end;
        }

        .right-col {
            justify-content: flex-end;
            flex-direction: row-reverse;
        }

        .center-final {
            width: 320px;
            /* Ajustado */
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
    </style>

    <svg id="bracket-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="neon-blue">
                <feGaussianBlur stdDeviation="2" result="blur" />
                <feMerge>
                    <feMergeNode in="blur" />
                    <feMergeNode in="SourceGraphic" />
                </feMerge>
            </filter>
        </defs>
    </svg>

    <div class="tournament-wrapper">
        <!-- BLOQUE IZQUIERDO -->
        <div class="side-col left-col">
            <div class="round round-q">
                <div id="q1" class="match-card"></div>
                <div id="q2" class="match-card"></div>
            </div>
            <div class="round">
                <div id="s1" class="match-card"></div>
            </div>
        </div>

        <div class="center-final">
            <div
                style="font-family: 'Orbitron'; font-size: 0.8rem; color: var(--accent-orange); letter-spacing: 3px; margin-bottom: 10px; text-align: center;">
                GRAN FINAL</div>
            <div id="f1" class="match-card"
                style="width: 100%; border-width: 2px; border-color: var(--accent-orange); padding: 30px;"></div>

            <div id="tournament-winner" class="winner-panel" style="display: none; margin-top: 30px;">
                <h2>CAMPEÓN</h2>
                <div id="champion-name"
                    style="font-size: 2.2rem; font-weight: 900; font-family: 'Orbitron'; text-shadow: 0 0 20px rgba(255,157,0,0.5);">
                    ---</div>
            </div>
        </div>

        <!-- BLOQUE DERECHO -->
        <div class="side-col right-col">
            <div class="round round-q">
                <div id="q3" class="match-card"></div>
                <div id="q4" class="match-card"></div>
            </div>
            <div class="round">
                <div id="s2" class="match-card"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "";
        let pollingInterval = null;

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
            playSound('blip');
        }

        function toggleTimer() {
            const panel = document.getElementById('timer-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                document.getElementById('side-menu').classList.remove('active'); // Cerrar menú al abrir timer
                playSound('validate');
            } else {
                panel.style.display = 'none';
                playSound('blip');
            }
        }


        async function fetchBracket() {
            try {
                const response = await fetch(`${API_URL}/bracket`);
                const data = await response.json();
                renderBracket(data);

                // Check if we need to continue polling
                const anyRunning = Object.values(data).some(m => m.status === "running");
                if (!anyRunning && pollingInterval) {
                    // We keep polling but slower? or just wait for next action
                }
            } catch (err) {
                console.error("Error fetching bracket:", err);
            }
        }

        function renderBracket(matches) {
            for (const [id, match] of Object.entries(matches)) {
                const el = document.getElementById(id);
                if (!el) continue;

                el.className = `match-card ${match.status}`;

                let html = `<div class="match-id">${id.toUpperCase()}</div>`;

                const renderTeam = (name) => {
                    if (!name) return `<div class="team" style="color: #444;">TBD</div>`;
                    const isWinner = match.winner === name;
                    const isLoser = match.winner && match.winner !== name && match.winner !== "EMPATE";
                    return `
                        <div class="team ${isWinner ? 'winner' : ''} ${isLoser ? 'loser' : ''}">
                            <span>${name}</span>
                            ${isWinner ? '<span>🏆</span>' : ''}
                        </div>
                    `;
                };

                html += renderTeam(match.team_a);
                html += renderTeam(match.team_b);

                if (match.status === "pending" && match.team_a && match.team_b) {
                    html += `<button class="btn-run" onclick="runMatch('${id}')">Iniciar Combate</button>`;
                } else if (match.status === "running") {
                    html += `<div style="text-align:center; padding: 5px;"><span class="status-badge status-running">En Combate...</span></div>`;
                } else if (match.status === "finished") {
                    html += `<div style="text-align:center; padding: 5px;"><span class="status-badge status-finished">Finalizado</span></div>`;
                }

                el.innerHTML = html;
            }

            // Global winner
            if (matches.f1 && matches.f1.status === "finished") {
                document.getElementById('tournament-winner').style.display = 'block';
                document.getElementById('champion-name').innerText = matches.f1.winner;
            } else {
                document.getElementById('tournament-winner').style.display = 'none';
            }
        }

        async function setupTournament() {
            playSound('click');
            await fetch(`${API_URL}/setup`, { method: 'POST' });
            fetchBracket();
        }

        async function resetTournament() {
            playSound('click');
            if (confirm("¿Resetear todo el torneo?")) {

                await fetch(`${API_URL}/reset`);
                fetchBracket();
            }
        }

        async function runMatch(id) {
            playSound('start');
            const ev = typeof window.event !== 'undefined' ? window.event : null;
            const btn = ev ? ev.target : null;

            if (btn && btn.tagName === 'BUTTON') {
                btn.disabled = true;
                btn.innerText = 'Iniciando...';
            }

            // Abrir la pestaña ANTES del await para evitar que el navegador bloquee el popup
            const dashWindow = window.open("http://127.0.0.1:8000/", "_blank");
            
            try {
                const response = await fetch(`${API_URL}/run/${id}`, { method: 'POST' });
                if (!response.ok) {
                    const errorData = await response.json();
                    alert("Error: " + (errorData.detail || "No se pudo iniciar el combate"));
                    if (dashWindow) dashWindow.close();
                    fetchBracket();
                    return;
                }
                
                fetchBracket();
                if (!pollingInterval) {
                    pollingInterval = setInterval(fetchBracket, 2000);
                }
            } catch (err) {
                console.error("Fetch error:", err);
                alert("Error de conexión con el servidor");
                if (dashWindow) dashWindow.close();
                fetchBracket();
            }
        }

        async function runNextMatch() {
            // Obtener el estado actual del bracket
            try {
                const response = await fetch(`${API_URL}/bracket`);
                const matches = await response.json();
                
                // Buscar el primer combate pendiente que tenga ambos equipos
                const order = ['q1','q2','q3','q4','s1','s2','f1'];
                const nextId = order.find(id => {
                    const m = matches[id];
                    return m && m.status === 'pending' && m.team_a && m.team_b;
                });

                if (nextId) {
                    toggleMenu(); // Cerrar menú
                    runMatch(nextId);
                } else {
                    alert("No hay combates pendientes listos para ejecutar.");
                }
            } catch (err) {
                console.error("Error al buscar siguiente combate:", err);
            }
        }

        // Initial fetch

        fetchBracket();
        // Constant slow polling
        setInterval(fetchBracket, 5000);

        // ── Countdown Timer Logic ─────────────────────────────────────────
        let countdownInterval = null;
        let remainingSeconds = 0;
        let audioCtx = null;

        function playSound(type) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'blip') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, now);
                osc.frequency.exponentialRampToValueAtTime(440, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'click') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(1200, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'start') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.5);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'validate') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(660, now);
                osc.frequency.setValueAtTime(880, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            }
        }

        function playBeep() {

            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Secuencia de 3 pitidos de alarma (estilo táctico)
            for(let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    oscillator.type = 'square';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime); // Frecuencia A5
                    
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                    
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.3);
                }, i * 500);
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(remainingSeconds / 60).toString().padStart(2, '0');
            const s = (remainingSeconds % 60).toString().padStart(2, '0');
            const display = document.getElementById('timer-display');
            display.innerText = `${m}:${s}`;
            
            // Efecto visual cuando quedan 10 segundos o menos
            if (remainingSeconds <= 10 && remainingSeconds > 0) {
                display.style.color = '#ff4b4b';
                display.style.textShadow = '0 0 20px rgba(255, 75, 75, 0.8)';
            } else if (remainingSeconds === 0 && countdownInterval === null) {
                 // Finalizado
                 display.style.color = '#ff4b4b';
            } else {
                display.style.color = '#fff';
                display.style.textShadow = '0 0 15px rgba(0, 212, 255, 0.6)';
            }
        }

        function startTimer() {
            playSound('click');
            if (countdownInterval) return; // Ya está corriendo

            
            const minutesInput = parseInt(document.getElementById('timer-minutes').value) || 5;
            
            if (remainingSeconds <= 0) {
                remainingSeconds = minutesInput * 60;
            }
            
            document.getElementById('btn-timer-start').disabled = true;
            
            // Inicializar AudioContext en interacción del usuario para cumplir con las políticas de Autoplay
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            updateTimerDisplay();
            
            countdownInterval = setInterval(() => {
                remainingSeconds--;
                updateTimerDisplay();
                
                if (remainingSeconds <= 0) {
                    clearInterval(countdownInterval);
                    countdownInterval = null;
                    document.getElementById('btn-timer-start').disabled = false;
                    playBeep();
                    
                    // Alarma visual: parpadeo rápido
                    let blinks = 0;
                    const blinkInt = setInterval(() => {
                        const el = document.getElementById('timer-display');
                        el.style.opacity = el.style.opacity === '0' ? '1' : '0';
                        blinks++;
                        if(blinks > 8) {
                            clearInterval(blinkInt);
                            el.style.opacity = '1';
                        }
                    }, 250);
                }
            }, 1000);
        }

        function resetTimer() {
            playSound('click');
            if (countdownInterval) {

                clearInterval(countdownInterval);
                countdownInterval = null;
            }
            const minutesInput = parseInt(document.getElementById('timer-minutes').value) || 5;
            remainingSeconds = minutesInput * 60;
            document.getElementById('btn-timer-start').disabled = false;
            updateTimerDisplay();
        }

        // Event listener para actualizar el display si cambian el input manualmente antes de iniciar
        document.getElementById('timer-minutes').addEventListener('change', () => {
            if (!countdownInterval) {
                resetTimer();
            }
        });


        // ── SVG Bracket Connectors ────────────────────────────────────────
        function r(id) { return document.getElementById(id).getBoundingClientRect(); }

        function addPath(svg, d, stroke, width, opacity, useFilter = false) {
            const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            p.setAttribute('d', d);
            p.setAttribute('fill', 'none');
            p.setAttribute('stroke', stroke);
            p.setAttribute('stroke-width', width);
            p.setAttribute('stroke-opacity', opacity);
            p.setAttribute('stroke-linecap', 'square');
            if (useFilter) p.setAttribute('filter', 'url(#neon-blue)');
            svg.appendChild(p);
        }

        function drawConnectors() {
            const svg = document.getElementById('bracket-svg');
            svg.querySelectorAll('path').forEach(e => e.remove());

            const rq1 = r('q1'), rq2 = r('q2'), rs1 = r('s1');
            const rq3 = r('q3'), rq4 = r('q4'), rs2 = r('s2');
            const rf1 = r('f1');

            const dim = 'rgba(255, 255, 255, 0.4)'; // Brighter lines for projector
            const blue = '#00e5ff'; // Brighter neon

            // ── LEFT SIDE: Q1 & Q2 → vertical bar → S1 ──
            const lBarX = rq1.right + (rs1.left - rq1.right) / 2;
            const lTop = Math.min(rq1.top + rq1.height / 2, rq2.top + rq2.height / 2);
            const lBot = Math.max(rq1.top + rq1.height / 2, rq2.top + rq2.height / 2);
            const lMidY = (lTop + lBot) / 2;

            addPath(svg, `M ${rq1.right} ${rq1.top + rq1.height / 2} H ${lBarX}`, dim, 3, 1);
            addPath(svg, `M ${rq2.right} ${rq2.top + rq2.height / 2} H ${lBarX}`, dim, 3, 1);
            addPath(svg, `M ${lBarX} ${lTop} V ${lBot}`, dim, 3, 1);
            addPath(svg, `M ${lBarX} ${lMidY} H ${rs1.left}`, dim, 3, 1);

            // ── RIGHT SIDE: Q3 & Q4 ← vertical bar ← S2 ──
            const rBarX = rs2.right + (rq3.left - rs2.right) / 2;
            const rTop = Math.min(rq3.top + rq3.height / 2, rq4.top + rq4.height / 2);
            const rBot = Math.max(rq3.top + rq3.height / 2, rq4.top + rq4.height / 2);
            const rMidY = (rTop + rBot) / 2;

            addPath(svg, `M ${rq3.left} ${rq3.top + rq3.height / 2} H ${rBarX}`, dim, 3, 1);
            addPath(svg, `M ${rq4.left} ${rq4.top + rq4.height / 2} H ${rBarX}`, dim, 3, 1);
            addPath(svg, `M ${rBarX} ${rTop} V ${rBot}`, dim, 3, 1);
            addPath(svg, `M ${rBarX} ${rMidY} H ${rs2.right}`, dim, 3, 1);

            // ── S1 → F1 (neon blue) ──
            const s1x = rs1.right, s1y = rs1.top + rs1.height / 2;
            const f1lx = rf1.left, f1y = rf1.top + rf1.height / 2;
            const lmx = s1x + (f1lx - s1x) / 2;
            // glow
            addPath(svg, `M ${s1x} ${s1y} H ${lmx} V ${f1y} H ${f1lx}`, blue, 12, 0.2);
            addPath(svg, `M ${s1x} ${s1y} H ${lmx} V ${f1y} H ${f1lx}`, blue, 4, 1, true);

            // ── S2 ← F1 (neon blue) ──
            const s2x = rs2.left, s2y = rs2.top + rs2.height / 2;
            const f1rx = rf1.right;
            const rmx = f1rx + (s2x - f1rx) / 2;
            addPath(svg, `M ${f1rx} ${f1y} H ${rmx} V ${s2y} H ${s2x}`, blue, 12, 0.2);
            addPath(svg, `M ${f1rx} ${f1y} H ${rmx} V ${s2y} H ${s2x}`, blue, 4, 1, true);
        }

        window.addEventListener('load', () => setTimeout(drawConnectors, 200));
        window.addEventListener('resize', drawConnectors);

        async function validateAgents() {
            playSound('click');
            // Cerrar el menú lateral para ver los resultados

            document.getElementById('side-menu').classList.remove('active');

            // Detectar la fase actual basándose en el estado de los combates
            let phase = 'q';
            try {
                const bRes = await fetch(`${API_URL}/bracket`);
                const matches = await bRes.json();
                
                const qFinished = ['q1','q2','q3','q4'].every(id => matches[id]?.status === 'finished');
                const sFinished = ['s1','s2'].every(id => matches[id]?.status === 'finished');
                
                if (sFinished) phase = 'f';
                else if (qFinished) phase = 's';
            } catch(e) { 
                console.warn("No se pudo detectar fase, usando 'q'", e);
            }

            const resPanel = document.getElementById('validation-results');
            const resContent = document.getElementById('validation-content');
            
            resPanel.style.display = 'block';
            resContent.innerHTML = `<div style="color:#666; font-family:JetBrains Mono;">Analizando agentes (Fase ${phase.toUpperCase()})...</div>`;

            try {
                const response = await fetch(`${API_URL}/validate/${phase}`);
                const data = await response.json();
                playSound('validate');
                
                let html = '';

                for (const [name, result] of Object.entries(data)) {
                    html += `
                        <div class="val-item">
                            <div class="val-name">${name}</div>
                            <div class="val-status ${result.is_valid ? 'val-success' : 'val-error'}">
                                ${result.is_valid ? '✔ VÁLIDO' : '✘ IRREGULAR'}
                            </div>
                            <div style="font-size:0.7rem; color:#888; margin-top:3px;">
                                Archivo: <span style="color:#aaa">${result.almacen_usado}</span><br>
                                Estrategia: ${result.word_count} palabras | Pedidos: [${result.ship_sizes.join(',')}]
                            </div>
                            ${!result.is_valid ? `
                                <ul class="val-error">
                                    ${result.errors.map(e => `<li>• ${e}</li>`).join('')}
                                </ul>
                            ` : ''}
                        </div>
                    `;
                }
                resContent.innerHTML = html;
            } catch (err) {
                resContent.innerHTML = '<div style="color:red;">Error de conexión con el validador.</div>';
            }
        }

        const _origRender = renderBracket;
        renderBracket = function (matches) {
            _origRender(matches);
            setTimeout(drawConnectors, 100);
        };
    </script>
</body>
