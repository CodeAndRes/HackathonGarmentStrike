# ─── Garment Strike – Engine Settings ──────────────────────────────────────────
# Parámetros de ejecución centralizados (No sensibles).
# Las API Keys deben permanecer en el archivo .env.

engine:
  default_model: "groq/llama-3.1-8b-instant"
  api_sleep: 12.0
  max_tokens: 120
  ui_sleep: 1.2
  max_retries: 3
  board_size: 6
  max_turns: 50
  ship_sizes: [4, 3, 3, 2]
#ship_sizes: [5, 4, 3, 3, 2]

models_catalog:
  groq:
    - "groq/llama-3.1-8b-instant"
    - "groq/llama-3.3-70b-versatile"
    - "groq/mixtral-8x7b-32768"
  gemini:
    - "gemini/gemini-2.5-flash"
    - "gemini/gemini-2.0-flash"
    - "gemini/gemini-1.5-flash"
  openai:
    - "openai/gpt-4o"
    - "openai/gpt-4o-mini"
  ollama:
    - "ollama/qwen2.5:1.5b"
    - "ollama/llama3.2:1b"
    - "ollama/qwen3.5:0.8b"
    - "ollama/phi3:mini"
    - "ollama/llama3:latest"
  deepseek:
    - "deepseek/deepseek-chat"
    - "deepseek/deepseek-reasoner"
    - "deepseek/deepseek-v4-flash"
    - "deepseek/deepseek-v4-pro"
