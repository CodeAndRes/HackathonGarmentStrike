# ─── Garment Strike – Engine Settings ──────────────────────────────────────────
# Parámetros de ejecución centralizados (No sensibles).
# Las API Keys deben permanecer en el archivo .env.

engine:
  default_model: "groq/llama-3.1-8b-instant"
  api_sleep: 7.0
  max_tokens: 120
  ui_sleep: 1.2
  max_retries: 3
  board_size: 6
  max_turns: 50
  ship_sizes: [4, 3, 3, 2]
#ship_sizes: [5, 4, 3, 3, 2]
